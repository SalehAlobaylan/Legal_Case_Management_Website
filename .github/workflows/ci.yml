name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          flags: frontend-unit
          name: frontend-unit-coverage
          fail_ci_if_error: false

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: legal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Legal-Case-Management-System
          path: backend
          token: ${{ secrets.BACKEND_REPO_TOKEN || github.token }}

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Setup backend database
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/legal_test
          JWT_SECRET: e2e-test-jwt-secret-must-be-at-least-32-chars
          JWT_EXPIRES_IN: 7d
          CORS_ORIGIN: "*"
          PORT: 3000
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REG_MONITOR_ENABLED: "false"
          CASE_DOC_EXTRACTION_ENABLED: "false"
          CASE_DOC_INSIGHTS_ENABLED: "false"
        run: |
          npm run db:generate || true
          npm run db:migrate || true

      - name: Start backend server
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/legal_test
          JWT_SECRET: e2e-test-jwt-secret-must-be-at-least-32-chars
          JWT_EXPIRES_IN: 7d
          CORS_ORIGIN: "*"
          PORT: 3000
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REG_MONITOR_ENABLED: "false"
          CASE_DOC_EXTRACTION_ENABLED: "false"
          CASE_DOC_INSIGHTS_ENABLED: "false"
        run: npm start &
        shell: bash

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/health > /dev/null 2>&1 || curl -s http://localhost:3000/api > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Create frontend E2E environment
        working-directory: frontend
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:3000" > .env.e2e
          echo "NEXT_PUBLIC_WS_URL=http://localhost:3000" >> .env.e2e

      - name: Run E2E tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 30
